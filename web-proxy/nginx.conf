upstream backend {
    server app:8000;
}

# default_server + явный alias для LE (иначе 404: уходит в FastAPI или не тот vhost)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name mckey.keenetic.link;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
    }

    # У FastAPI нет GET / — в браузере на корень кидаем в Swagger
    location = / {
        return 302 /docs;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# До выпуска LE: самоподписанный (Telegram не примет).
# После certbot: раскомментируй блок ssl_le и закомментируй ssl_self,
# пересобери/перезагрузи nginx (см. инструкцию в ответе / certbot/README).
server {
    listen 443 ssl;
    server_name mckey.keenetic.link;

    # --- ssl_self (по умолчанию) ---
    ssl_certificate /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;

    # --- ssl_le (после certbot, том ./certbot/conf смонтирован в /etc/letsencrypt) ---
    # ssl_certificate /etc/letsencrypt/live/mckey.keenetic.link/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mckey.keenetic.link/privkey.pem;

    location = / {
        return 302 /docs;
    }

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
