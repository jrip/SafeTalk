version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - app/.env
    volumes:
      - ./app:/workspace/app
    depends_on:
      - database
      - rabbitmq

  web-proxy:
    build: ./web-proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safetalk
      POSTGRES_PASSWORD: safetalk
      POSTGRES_DB: safetalk
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
