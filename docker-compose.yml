services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - app/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      ML_TOXICITY_BACKEND: rubert
    volumes:
      - ./app:/workspace/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 6s
      retries: 18
      start_period: 90s

  ml-worker:
    build:
      context: .
      dockerfile: ml-worker/Dockerfile
    command: ["python", "/workspace/ml-worker/main.py"]
    env_file:
      - app/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      ML_TOXICITY_BACKEND: rubert
      ML_WORKER_SKIP_ERRORS: "false"
      ML_WORKER_SKIP_ERRORS_LIMIT: "1"
    volumes:
      - ./app:/workspace/app
      - ./ml-worker:/workspace/ml-worker
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: on-failure
    scale: 2

  web-proxy:
    build: ./web-proxy
    ports:
      - "${WEB_PROXY_HTTP_PORT:-80}:80"
      - "${WEB_PROXY_HTTPS_PORT:-443}:443"
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 25s

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safetalk
      POSTGRES_PASSWORD: safetalk
      POSTGRES_DB: safetalk
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetalk -d safetalk"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data:
