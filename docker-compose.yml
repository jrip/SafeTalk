services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file:
      - app/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      ML_TOXICITY_BACKEND: rubert
    volumes:
      - ./app:/workspace/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  
  ml-worker:
    build:
      context: .
      dockerfile: app/Dockerfile
    command: ["python", "-m", "app.workers.ml_rabbit_worker"]
    env_file:
      - app/.env
    environment:
      RABBITMQ_HOST: rabbitmq
      ML_TOXICITY_BACKEND: rubert
      ML_WORKER_SKIP_ERRORS: "false"
      ML_WORKER_SKIP_ERRORS_LIMIT: "1"
    volumes:
      - ./app:/workspace/app
    depends_on:
      rabbitmq:
        condition: service_started
    restart: on-failure
    scale: 2

  web-proxy:
    build: ./web-proxy
    ports:
      - "${WEB_PROXY_HTTP_PORT:-80}:80"
      - "${WEB_PROXY_HTTPS_PORT:-443}:443"
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safetalk
      POSTGRES_PASSWORD: safetalk
      POSTGRES_DB: safetalk
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetalk -d safetalk"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data:
